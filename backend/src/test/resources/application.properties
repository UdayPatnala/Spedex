# ── Server ──
server.port=8080
server.servlet.context-path=

# ── H2 Database (in-memory for unit and integration testing) ──
spring.datasource.url=jdbc:h2:mem:spedex_test_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true

# ── Jackson: snake_case to match frontend contract ──
spring.jackson.property-naming-strategy=SNAKE_CASE
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss

# ── JWT ──
spedex.jwt.secret=test_secret_that_is_at_least_256_bits_long_for_testing_purposes_only
spedex.jwt.expiration-ms=86400000

# ── CORS ──
spedex.cors.allowed-origins=http://localhost:5173,http://localhost:3000
